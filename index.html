<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Your Trading Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f6f8ff;
color:#111;
}

.container{
max-width:480px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
text-align:center;
}

h2{
font-size:22px;
margin-bottom:15px;
}

.option{
background:#f1f4ff;
padding:14px;
border-radius:12px;
margin:10px 0;
cursor:pointer;
font-weight:500;
transition:.3s;
}

.option:hover{
background:#2b5cff;
color:white;
}

/* FINAL SCREEN */

.final{
display:none;
text-align:center;
}

.bonus{
background:#fff;
padding:18px;
border-radius:16px;
margin-top:15px;
box-shadow:0 8px 30px rgba(0,0,0,0.07);
}

.sticky-btn{
display:block;
margin-top:20px;
background:linear-gradient(135deg,#ff7b00,#ff5200);
color:white;
padding:16px;
border-radius:12px;
text-decoration:none;
font-size:18px;
font-weight:600;
}

/* PROGRESS */

.progress{
text-align:center;
font-size:13px;
margin-bottom:10px;
color:#666;
}

</style>

<!-- META PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '1982488422624043');
fbq('track', 'PageView');
</script>

</head>

<body>

<div class="container">

<div class="progress" id="progress">Step 1 of 3</div>

<!-- QUIZ -->
<div class="card" id="quiz">

<h2 id="question">Do you want to start earning from Stock Market?</h2>

<div class="option" onclick="nextQ()">Yes, I want to earn</div>
<div class="option" onclick="nextQ()">Just exploring</div>

</div>

<!-- FINAL -->
<div class="card final" id="final">

<h2>🎉 You're Eligible!</h2>

<p>You can start trading today & get exclusive benefits</p>

<div class="bonus">
🎁 <b>₹50,000 Trading Masterclass FREE</b><br><br>
Learn strategies, risk management & live trading
</div>

<a class="sticky-btn" href="#" onclick="trackLead()">
Start My Trading Journey 🚀
</a>

</div>

</div>

<script>

let step = 1;

function nextQ(){

step++;

if(step == 2){
document.getElementById("question").innerText = "Are you a beginner in trading?";
document.getElementById("progress").innerText = "Step 2 of 3";
}

else if(step == 3){
document.getElementById("question").innerText = "Do you want FREE trading training worth ₹50,000?";
document.getElementById("progress").innerText = "Step 3 of 3";
}

else{
document.getElementById("quiz").style.display = "none";
document.getElementById("progress").style.display = "none";
document.getElementById("final").style.display = "block";
}

}

// 🔥 LEAD TRACKING FUNCTION
function trackLead(){

// FIRE LEAD EVENT WITH DATA
fbq('track', 'Lead', {
content_name: 'Demat Account Opening',
value: 1,
currency: 'INR'
});

// DELAY FOR PROPER TRACKING
setTimeout(function(){
window.location.href = "https://a.aonelink.in/ANGOne/4LKY6fC";
}, 500);

}

</script>

</body>
</html>
